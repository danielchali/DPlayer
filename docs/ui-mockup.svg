<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161B22"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00C853"/>
      <stop offset="100%" stop-color="#00E676"/>
    </linearGradient>
  </defs>

  <!-- Window frame -->
  <rect x="40" y="30" width="1200" height="660" rx="12" fill="url(#bg)" stroke="#30363D" stroke-width="1"/>

  <!-- Title bar -->
  <rect x="40" y="30" width="1200" height="40" rx="12" fill="#161B22"/>
  <rect x="40" y="58" width="1200" height="12" fill="#161B22"/>
  <circle cx="68" cy="50" r="5" fill="#00C853"/>
  <text x="82" y="54" fill="#E6EDF3" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600">DPlayer</text>
  <text x="640" y="54" fill="#8B949E" font-family="Segoe UI, sans-serif" font-size="11" text-anchor="middle">sample_movie.mkv</text>
  <text x="1210" y="54" fill="#8B949E" font-family="Segoe MDL2 Assets" font-size="10" text-anchor="end"> ˇ </text>

  <!-- Video area -->
  <rect x="40" y="70" width="880" height="540" fill="#000000"/>
  <polygon points="420,310 420,370 470,340" fill="#00C853" opacity="0.6"/>

  <!-- Playlist panel -->
  <rect x="920" y="70" width="320" height="540" fill="#161B22" stroke="#30363D" stroke-width="1"/>
  <text x="936" y="96" fill="#E6EDF3" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600">Playlist</text>
  <rect x="936" y="108" width="288" height="28" rx="6" fill="#2500C853"/>
  <text x="948" y="126" fill="#69F0AE" font-family="Segoe UI, sans-serif" font-size="11">01  Opening.mkv</text>
  <text x="948" y="156" fill="#8B949E" font-family="Segoe UI, sans-serif" font-size="11">02  Episode 01.mkv</text>
  <text x="948" y="180" fill="#8B949E" font-family="Segoe UI, sans-serif" font-size="11">03  Episode 02.mkv</text>

  <!-- Control bar -->
  <rect x="40" y="610" width="1200" height="80" fill="#161B22" stroke="#30363D" stroke-width="1"/>
  <rect x="40" y="610" width="1200" height="1" fill="#30363D"/>

  <!-- Seek bar -->
  <rect x="72" y="628" width="1136" height="4" rx="2" fill="#30363D"/>
  <rect x="72" y="628" width="420" height="4" rx="2" fill="url(#accent)"/>
  <circle cx="492" cy="630" r="6" fill="#00E676"/>

  <text x="72" y="660" fill="#8B949E" font-family="Consolas, monospace" font-size="11">12:34</text>
  <text x="1200" y="660" fill="#8B949E" font-family="Consolas, monospace" font-size="11" text-anchor="end">45:00</text>

  <!-- Transport buttons -->
  <circle cx="560" cy="668" r="22" fill="url(#accent)"/>
  <text x="560" y="673" fill="#0D1117" font-family="Segoe MDL2 Assets" font-size="14" text-anchor="middle">¶</text>
  <text x="500" y="673" fill="#E6EDF3" font-family="Segoe MDL2 Assets" font-size="12" text-anchor="middle">î</text>
  <text x="620" y="673" fill="#E6EDF3" font-family="Segoe MDL2 Assets" font-size="12" text-anchor="middle">í</text>

  <text x="1100" y="673" fill="#00C853" font-family="Segoe UI, sans-serif" font-size="11">1.0x</text>
</svg>
